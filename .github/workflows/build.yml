name: Build dist

on:
  push:
    branches: [main]

jobs:
  build:
    # Skip when the commit was our own auto-rebuild, otherwise we loop forever.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit dist/ if changed
        run: |
          if [[ -n $(git status --porcelain dist/) ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add dist/
            git commit -m "build: auto-rebuild dist/ [skip ci]"
            git push
            echo "Pushed updated dist/"
          else
            echo "dist/ is up to date — no commit needed"
          fi
